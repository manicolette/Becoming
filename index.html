<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Becoming</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1A1B1E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A1B1E;
    --ink-soft:#24262B;
    --ink-line:#33363D;
    --parchment:#F7F3EC;
    --parchment-dim:#EAE3D6;
    --text-hi:#F2EFE9;
    --text-mid:#A8A9AE;
    --text-dim:#6E707A;
    --sage:#8FA888;
    --sage-dim:#5C6E58;
    --amber:#D4A04C;
    --rose:#C97B7B;
    --blue-accent:#7B9FC9;
    --rule:#3A3D44;
    --serif: 'Source Serif 4', Georgia, serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--text-hi);
    font-family:var(--serif);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{max-width:980px;margin:0 auto;padding:28px 20px 100px;}

  /* ---------- header ---------- */
  .masthead{
    display:flex;justify-content:space-between;align-items:baseline;
    padding-bottom:18px;border-bottom:1px solid var(--rule);margin-bottom:26px;
    flex-wrap:wrap;gap:10px;
  }
  .masthead h1{
    font-family:var(--serif);font-weight:600;font-size:28px;letter-spacing:-0.01em;margin:0;
    font-variant-ligatures:common-ligatures;
  }
  .masthead h1 em{font-style:italic;color:var(--sage);font-weight:500;}
  .masthead .sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;}
  .asof{font-family:var(--mono);font-size:11px;color:var(--text-mid);text-align:right;}
  .asof b{color:var(--text-hi);font-weight:600;}

  /* ---------- category groups ---------- */
  .group{margin-bottom:6px;}
  .group-head{
    display:flex;align-items:center;gap:10px;
    padding:14px 4px 8px;
    cursor:pointer;user-select:none;
  }
  .group-head .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .group-head h2{
    font-family:var(--mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--text-mid);font-weight:600;margin:0;flex:1;
  }
  .group-head .count{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
  .group-head .chev{color:var(--text-dim);font-size:11px;transition:transform .15s ease;}
  .group.collapsed .chev{transform:rotate(-90deg);}
  .group.collapsed .rows{display:none;}

  .add-cat-row{display:flex;gap:8px;padding:14px 4px;}
  .add-cat-row input{
    flex:1;background:transparent;border:none;border-bottom:1px dashed var(--rule);
    color:var(--text-mid);font-family:var(--mono);font-size:12px;padding:6px 2px;
    letter-spacing:0.04em;
  }
  .add-cat-row input::placeholder{color:var(--text-dim);}
  .add-cat-row input:focus{outline:none;border-bottom-color:var(--sage);color:var(--text-hi);}
  .add-cat-row button{
    background:transparent;border:1px solid var(--rule);color:var(--text-mid);
    font-family:var(--mono);font-size:11px;letter-spacing:0.05em;text-transform:uppercase;
    padding:6px 12px;border-radius:var(--radius);cursor:pointer;
  }
  .add-cat-row button:hover{border-color:var(--sage);color:var(--sage);}

  /* ---------- ledger row (one goal/entry) ---------- */
  .rows{display:flex;flex-direction:column;gap:1px;}
  .entry{
    background:var(--ink-soft);
    border:1px solid var(--ink-line);
    border-radius:var(--radius);
    margin-bottom:8px;
    overflow:hidden;
  }
  .entry-top{
    display:grid;
    grid-template-columns: 1fr auto;
    align-items:start;
    padding:16px 16px 10px;
    gap:12px;
  }
  .entry-name-wrap{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .entry-name{
    font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text-hi);
    background:transparent;border:none;outline:none;padding:0;width:100%;
  }
  .entry-name::placeholder{color:var(--text-dim);font-weight:400;}
  .entry-note{
    font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--text-mid);
    background:transparent;border:none;outline:none;padding:0;width:100%;resize:none;
    line-height:1.4;
  }
  .entry-note::placeholder{color:var(--text-dim);}
  .entry-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .icon-btn{
    background:transparent;border:none;color:var(--text-dim);cursor:pointer;
    font-size:14px;padding:4px;line-height:1;border-radius:var(--radius);
  }
  .icon-btn:hover{color:var(--rose);background:rgba(201,123,123,0.08);}

  /* now / future strip */
  .nf-strip{
    display:grid;
    grid-template-columns: 1fr 1px 1fr;
    gap:0;
    margin:0 16px 12px;
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--ink-line);
  }
  .nf-cell{padding:11px 13px;background:rgba(247,243,236,0.03);}
  .nf-cell.future{background:rgba(143,168,136,0.06);}
  .nf-divider{background:var(--rule);}
  .nf-label{
    font-family:var(--mono);font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:6px;display:flex;align-items:center;gap:6px;
  }
  .nf-label .sw{width:5px;height:5px;border-radius:50%;}
  .nf-row{display:flex;align-items:baseline;gap:8px;}
  .nf-input-num{
    background:transparent;border:none;border-bottom:1px solid var(--ink-line);
    font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text-hi);
    width:64px;padding:2px 0;outline:none;
  }
  .nf-input-num:focus{border-bottom-color:var(--sage);}
  .nf-unit{
    background:transparent;border:none;font-family:var(--mono);font-size:10.5px;
    color:var(--text-dim);width:46px;outline:none;border-bottom:1px solid transparent;
  }
  .nf-unit:focus{border-bottom-color:var(--ink-line);color:var(--text-mid);}
  .nf-unit::placeholder{color:var(--text-dim);}
  .nf-text{
    background:transparent;border:none;font-family:var(--serif);font-size:13px;
    color:var(--text-hi);outline:none;width:100%;line-height:1.4;
  }
  .nf-text::placeholder{color:var(--text-dim);font-style:italic;}
  .nf-toggle-mode{
    font-family:var(--mono);font-size:9px;color:var(--text-dim);cursor:pointer;
    text-decoration:underline;text-decoration-color:var(--ink-line);
    margin-top:6px;display:inline-block;letter-spacing:0.04em;
  }
  .nf-toggle-mode:hover{color:var(--sage);}

  /* timeline spine */
  .spine-wrap{padding:4px 16px 16px;}
  .spine-head{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
  }
  .spine-head .horizon-label{
    font-family:var(--mono);font-size:9.5px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;
  }
  .spine-head .pct{
    font-family:var(--mono);font-size:11px;font-weight:600;
  }
  .pct.on-track{color:var(--sage);}
  .pct.behind{color:var(--rose);}
  .pct.ahead{color:var(--amber);}
  .pct.neutral{color:var(--text-dim);}

  .spine{
    position:relative;height:46px;margin:0 2px;
  }
  .spine-line{
    position:absolute;top:18px;left:0;right:0;height:1px;background:var(--rule);
  }
  .spine-fill{
    position:absolute;top:18px;left:0;height:1px;background:var(--sage);
    transition:width .3s ease;
  }
  .spine-marks{position:absolute;top:0;left:0;right:0;height:100%;display:flex;justify-content:space-between;}
  .spine-mark{
    position:relative;flex:1;display:flex;flex-direction:column;align-items:center;
    cursor:pointer;
  }
  .spine-mark:first-child{flex:0;align-items:flex-start;}
  .spine-mark:last-child{flex:0;align-items:flex-end;}
  .spine-dot{
    width:9px;height:9px;border-radius:50%;background:var(--ink-line);
    border:2px solid var(--ink-soft);position:relative;top:13px;z-index:2;
    transition:all .15s ease;
  }
  .spine-mark.has-target .spine-dot{background:var(--amber);}
  .spine-mark.now .spine-dot{background:var(--text-hi);width:11px;height:11px;top:12px;}
  .spine-tick{
    font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:26px;
    letter-spacing:0.02em;white-space:nowrap;
  }
  .spine-mark.has-target .spine-tick{color:var(--amber);}
  .spine-mark.status-hit .spine-tick{color:var(--sage);}
  .spine-mark.status-exceeded .spine-tick{color:var(--blue-accent);}
  .spine-mark.status-missed .spine-tick{color:var(--rose);}
  .spine-mark:hover .spine-dot{transform:scale(1.3);}

  .horizon-edit{
    margin-top:10px;padding:12px 14px;background:rgba(212,160,76,0.06);
    border:1px solid rgba(212,160,76,0.25);border-radius:var(--radius);
    display:flex;flex-direction:column;gap:10px;
  }
  .horizon-edit .he-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .horizon-edit .he-label{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:0.05em;text-transform:uppercase;}
  .horizon-edit input{
    background:var(--ink);border:1px solid var(--ink-line);color:var(--text-hi);
    font-family:var(--mono);font-size:12px;padding:5px 8px;border-radius:var(--radius);
    width:80px;outline:none;
  }
  .horizon-edit input:focus{border-color:var(--amber);}
  .horizon-edit .he-close{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-dim);cursor:pointer;}
  .he-outcome{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .status-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .status-pill{
    background:transparent;border:1px solid var(--ink-line);color:var(--text-mid);
    font-family:var(--mono);font-size:10px;letter-spacing:0.03em;text-transform:uppercase;
    padding:5px 10px;border-radius:12px;cursor:pointer;transition:all .15s ease;
  }
  .status-pill:hover{border-color:var(--text-mid);}
  .status-pill.active{background:rgba(255,255,255,0.04);}
  .he-note{
    background:var(--ink);border:1px solid var(--ink-line);color:var(--text-hi);
    font-family:var(--serif);font-style:italic;font-size:12.5px;padding:8px 10px;
    border-radius:var(--radius);outline:none;resize:vertical;line-height:1.4;width:100%;
  }
  .he-note::placeholder{color:var(--text-dim);}
  .he-note:focus{border-color:var(--amber);}

  .add-entry-btn{
    display:flex;align-items:center;gap:6px;
    background:transparent;border:1px dashed var(--ink-line);color:var(--text-dim);
    font-family:var(--mono);font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
    padding:10px 14px;border-radius:var(--radius);cursor:pointer;width:100%;justify-content:center;
    margin-bottom:8px;
  }
  .add-entry-btn:hover{border-color:var(--sage);color:var(--sage);}

  /* empty state */
  .empty{
    text-align:center;padding:60px 20px;color:var(--text-dim);
  }
  .empty .big{font-family:var(--serif);font-size:18px;color:var(--text-mid);margin-bottom:8px;font-style:italic;}
  .empty .small{font-family:var(--mono);font-size:11px;}

  /* loading */
  .loading{display:flex;align-items:center;justify-content:center;min-height:50vh;color:var(--text-dim);font-family:var(--mono);font-size:12px;letter-spacing:0.05em;}

  footer.legend{
    margin-top:30px;padding-top:16px;border-top:1px solid var(--rule);
    display:flex;gap:18px;flex-wrap:wrap;
    font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:0.03em;
  }
  footer.legend span{display:flex;align-items:center;gap:5px;}
  footer.legend .sw{width:7px;height:7px;border-radius:50%;}

  @media (max-width:600px){
    .nf-strip{grid-template-columns:1fr;}
    .nf-divider{height:1px;width:100%;}
    .entry-top{grid-template-columns:1fr auto;}
    .masthead h1{font-size:23px;}
  }

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--ink-line);border-radius:4px;}

  /* ---------- sync / auth ---------- */
  .sync-dot{
    width:9px;height:9px;border-radius:50%;background:var(--text-dim);
    cursor:pointer;flex-shrink:0;transition:background .2s ease;
    box-shadow:0 0 0 3px transparent;
  }
  .sync-dot.synced{background:var(--sage);}
  .sync-dot.syncing{background:var(--amber);animation:pulse 1s ease-in-out infinite;}
  .sync-dot.error{background:var(--rose);}
  .sync-dot.offline{background:var(--text-dim);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .sync-row{display:flex;align-items:center;gap:7px;justify-content:flex-end;margin-top:4px;}
  .sync-label{font-family:var(--mono);font-size:9.5px;color:var(--text-dim);letter-spacing:0.05em;cursor:pointer;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:6px;
    padding:24px;max-width:360px;width:100%;
  }
  .modal h3{font-family:var(--serif);font-size:18px;margin:0 0 4px;color:var(--text-hi);}
  .modal p.sub{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin:0 0 18px;line-height:1.5;}
  .modal label{display:block;font-family:var(--mono);font-size:10px;color:var(--text-mid);letter-spacing:0.05em;margin-bottom:5px;text-transform:uppercase;}
  .modal input{
    width:100%;background:var(--ink);border:1px solid var(--ink-line);color:var(--text-hi);
    font-family:var(--mono);font-size:13px;padding:9px 10px;border-radius:4px;outline:none;
    margin-bottom:14px;
  }
  .modal input:focus{border-color:var(--sage);}
  .modal-actions{display:flex;gap:8px;margin-top:6px;}
  .modal-actions button{
    flex:1;font-family:var(--mono);font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
    padding:10px;border-radius:4px;cursor:pointer;border:1px solid var(--ink-line);background:transparent;color:var(--text-mid);
  }
  .modal-actions button.primary{background:var(--sage-dim);border-color:var(--sage);color:var(--text-hi);}
  .modal-actions button.primary:hover{background:var(--sage);}
  .modal-actions button:hover{border-color:var(--text-mid);}
  .modal-toggle{font-family:var(--mono);font-size:10.5px;color:var(--text-dim);text-align:center;margin-top:14px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--ink-line);}
  .modal-toggle:hover{color:var(--sage);}
  .modal-err{font-family:var(--mono);font-size:10.5px;color:var(--rose);margin:-6px 0 14px;line-height:1.4;}
  .modal-close-x{position:absolute;top:14px;right:16px;color:var(--text-dim);cursor:pointer;font-size:14px;background:transparent;border:none;}
</style>
</head>
<body>
<div id="root"><div class="loading">opening the ledger…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {
  useState,
  useEffect,
  useRef,
  useCallback
} = React;

/* ---------- constants ---------- */
const HORIZONS = [{
  key: 'm3',
  label: '3mo'
}, {
  key: 'm6',
  label: '6mo'
}, {
  key: 'y1',
  label: '1yr'
}, {
  key: 'm18',
  label: '18mo'
}, {
  key: 'y2',
  label: '2yr'
}, {
  key: 'y3',
  label: '3yr'
}, {
  key: 'y4',
  label: '4yr'
}];
const STATUS_OPTIONS = [{
  key: 'pending',
  label: 'in progress',
  color: 'var(--text-dim)'
}, {
  key: 'hit',
  label: 'hit',
  color: 'var(--sage)'
}, {
  key: 'exceeded',
  label: 'exceeded',
  color: 'var(--blue-accent)'
}, {
  key: 'missed',
  label: 'missed',
  color: 'var(--rose)'
}];
const DEFAULT_CATEGORIES = [{
  id: 'cat_debt',
  name: 'Debt & Money',
  color: '#C97B7B'
}, {
  id: 'cat_health',
  name: 'Health & Body',
  color: '#8FA888'
}, {
  id: 'cat_skills',
  name: 'Skills',
  color: '#D4A04C'
}, {
  id: 'cat_career',
  name: 'Career',
  color: '#9AA7C9'
}];
const uid = (p = 'id') => `${p}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
function newEntry(catId) {
  return {
    id: uid('entry'),
    catId,
    name: '',
    mode: 'numeric',
    // 'numeric' | 'text'
    now: {
      num: '',
      unit: '',
      text: ''
    },
    targets: {},
    // { m3: {num, text, status, note}, ... }
    note: ''
  };
}

/* ---------- Supabase config (same project as Melissa's other apps) ---------- */
const SB_URL = 'https://uvqjswdfcixwktgvnzbq.supabase.co';
const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWpzd2RmY2l4d2t0Z3ZuemJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDExMzEsImV4cCI6MjA4NzkxNzEzMX0.SMB9fnxmLHFNTNkJk47UFpMqlccv_wvJOYAicvGxqoI';
const SB_COLUMN = 'becoming_data';
const SB_TABLE = 'user_data';
const LOCAL_KEY = 'becoming_local_data';
const SESSION_KEY = 'becoming_sb_session';
function getLocalSession() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  } catch {
    return null;
  }
}
function setLocalSession(s) {
  if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));else localStorage.removeItem(SESSION_KEY);
}
async function sbAuthRequest(path, body) {
  const res = await fetch(`${SB_URL}/auth/v1/${path}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SB_ANON_KEY
    },
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error_description || json.msg || json.error || 'Auth failed');
  return json;
}
async function sbSignUp(email, password) {
  return sbAuthRequest('signup', {
    email,
    password
  });
}
async function sbSignIn(email, password) {
  return sbAuthRequest('token?grant_type=password', {
    email,
    password
  });
}
async function sbPull(session) {
  const res = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?id=eq.${session.user.id}&select=${SB_COLUMN}`, {
    headers: {
      apikey: SB_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    }
  });
  if (!res.ok) throw new Error('Pull failed: ' + res.status);
  const rows = await res.json();
  if (rows.length && rows[0][SB_COLUMN]) return rows[0][SB_COLUMN];
  return null;
}
async function sbPush(session, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
    method: 'POST',
    headers: {
      apikey: SB_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify({
      id: session.user.id,
      [SB_COLUMN]: data,
      updated_at: new Date().toISOString()
    })
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error('Push failed: ' + t);
  }
}

/* ---------- local storage ---------- */
function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {/* ignore */}
  return null;
}
function saveLocal(data) {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('local save failed', e);
  }
}
function seedData() {
  return {
    categories: DEFAULT_CATEGORIES,
    entries: [],
    collapsed: {}
  };
}

/* ---------- App ---------- */
